name: Deploy to GitHub Pages

# Auto-publishes the docs site from `main`. The /prototype/ build is NOT in
# this repo (it comes from the app repo, copied onto gh-pages at deploy time),
# so this workflow carries the existing prototype/ over from gh-pages before
# deploying — main edits go live without 404-ing the prototype.
#
# One-time setup: Settings → Pages → Source = "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Assemble site (main docs + prototype/ from gh-pages)
        run: |
          mkdir _site
          cp -r index.html documentation wireframes _site/
          git fetch origin gh-pages
          if git rev-parse --verify --quiet origin/gh-pages >/dev/null; then
            git archive origin/gh-pages prototype | tar -x -C _site || \
              echo "No prototype/ on gh-pages — skipping."
          fi
          touch _site/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
